name: meubolso-stack

services:
  db:
    image: postgres:16-alpine
    container_name: meubolso-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meubolso}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 15

  backend:
    build:
      context: ./v1/v1
      dockerfile: Dockerfile
    container_name: meubolso-backend
    restart: unless-stopped
    environment:
      SERVER_PORT: ${SERVER_PORT:-2030}
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/meubolso}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-very-long-secret-with-at-least-64-bytes-change-me}
      JWT_ACCESS_MINUTES: ${JWT_ACCESS_MINUTES:-30}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-14}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      APP_SEED_ADMIN_NAME: ${APP_SEED_ADMIN_NAME:-Administrador}
      APP_SEED_ADMIN_EMAIL: ${APP_SEED_ADMIN_EMAIL:-admin@gggg.com}
      APP_SEED_ADMIN_PASSWORD: ${APP_SEED_ADMIN_PASSWORD:-admin@gggg.com}
    ports:
      - "2030:2030"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2030/actuator/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  frontend:
    build:
      context: ./MeuBolsoFront
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:2030}
    container_name: meubolso-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:

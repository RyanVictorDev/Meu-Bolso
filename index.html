<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>meubolso</title>
  </head>
  <body>
    <script>
      ;(function () {
        try {
          var raw = localStorage.getItem('meubolso_ui_v1')
          if (!raw) return
          var o = JSON.parse(raw)
          if (o.mode === 'light' || o.mode === 'dark') {
            document.documentElement.dataset.theme = o.mode
          }
          if (typeof o.accent === 'string' && /^#[0-9a-fA-F]{6}$/.test(o.accent.trim())) {
            document.documentElement.style.setProperty('--accent', o.accent.trim().toLowerCase())
          }
        } catch (e) {
          /* ignore */
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

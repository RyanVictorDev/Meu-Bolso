server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota (ex.: /transacoes) volta para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Evita cache agressivo do HTML (facilita deploys)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
